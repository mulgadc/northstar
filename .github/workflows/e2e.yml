name: E2E

on:
  push:
    branches: [main, dev]
    paths:
      - "**/*.go"
      - go.mod
      - go.sum
      - Makefile
      - Dockerfile
      - e2e/**
      - .github/workflows/e2e.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E (northstar + predastore)
    runs-on: ubuntu-26.04
    timeout-minutes: 20
    steps:
      - name: Checkout northstar
        uses: actions/checkout@v7
        with:
          path: northstar

      - name: Checkout predastore
        uses: actions/checkout@v7
        with:
          repository: mulgadc/predastore
          ref: dev
          path: predastore

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: northstar/e2e/go.mod
          cache-dependency-path: northstar/e2e/go.sum

      - name: Run E2E
        working-directory: northstar
        run: make e2e

      - name: Teardown
        if: always()
        working-directory: northstar/e2e
        run: docker compose down -v
