services:
  predastore:
    build:
      context: ${PREDASTORE_SRC:-../../predastore}
      dockerfile_inline: |
        FROM golang:1.26.5-alpine AS build
        RUN apk add build-base git
        WORKDIR /src
        COPY . .
        RUN GOFIPS140=v1.0.0 go build -ldflags "-s -w" -o /s3d ./cmd/s3d
        FROM alpine:3.23
        RUN apk add ca-certificates gcompat netcat-openbsd
        COPY --from=build /s3d /s3d
        RUN printf '0123456789abcdef0123456789abcdef' > /encryption.key && chmod 600 /encryption.key
        EXPOSE 9443
        CMD ["/s3d"]
    environment:
      PORT: "9443"
      CONFIG: "/config/predastore.toml"
      TLS_CERT: "/certs/predastore.pem"
      TLS_KEY: "/certs/predastore.key"
      SSL_CERT_FILE: "/certs/ca.pem"
      ENCRYPTION_KEY_FILE: "/encryption.key"
    volumes:
      - ./testdata/predastore.toml:/config/predastore.toml:ro
      - ./testdata/certs:/certs:ro
      - zone-data:/data/dns-zones
    ports:
      - "9443:9443"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9443"]
      interval: 2s
      timeout: 5s
      retries: 10

  northstar:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      ZONE_DIR: "s3://dns-zones"
      AWS_ACCESS_KEY: "AKIAIOSFODNN7EXAMPLE"
      AWS_SECRET_ACCESS_KEY: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      AWS_REGION: "us-east-1"
      NORTHSTAR_S3_ENDPOINT: "https://predastore:9443"
      SSL_CERT_FILE: "/certs/ca.pem"
      S3_SYNC_RETRY: "3"
      PORT: "5553"
      HOST: "0.0.0.0"
      DOT_PORT: "8853"
      NORTHSTAR_TLS_CERT: "/certs/server.pem"
      NORTHSTAR_TLS_KEY: "/certs/server.key"
    volumes:
      - ./testdata/certs:/certs:ro
    ports:
      - "5553:5553/udp"
      - "5553:5553/tcp"
      - "8853:8853/tcp"
    depends_on:
      predastore:
        condition: service_healthy

volumes:
  zone-data:
